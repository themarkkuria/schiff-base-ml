# Conda environment for schiff-base-ml (CI and local use)
name: schiff-base-ml
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - jupyter
  - ipykernel
  - openpyxl
  - pip
  - pip:
    - rdkit-pypi
    - pubchempy
    - biopython
    - torch
    - transformers
    - optuna
    - imbalanced-learn
    - shap
    - streamlit
    - pandas-profiling
    - plotly
    - tqdm
    - requests
    - python-dotenv
    - flake8
    - pytest
